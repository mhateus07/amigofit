services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: amigofit
      POSTGRES_USER: amigofit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amigofit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: amigofit
      DB_USER: amigofit
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
