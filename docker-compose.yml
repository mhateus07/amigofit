services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: amigofit
      POSTGRES_USER: amigofit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amigofit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: amigofit
      DB_USER: amigofit
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:19006}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.amigofit-api.entrypoints=https"
      - "traefik.http.routers.amigofit-api.rule=Host(`amigofit-api.impulsiodigital.com`)"
      - "traefik.http.routers.amigofit-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.amigofit-api.loadbalancer.server.port=3001"

networks:
  default:
    name: amigofit_default
  easypanel:
    external: true

volumes:
  pgdata:
